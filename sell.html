<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Listing - Thrift Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <nav class="bg-emerald-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🛒 Campus Thrift</h1>
            <div class="space-x-4">
                <a href="market.html" class="hover:underline">Buy</a>
                <a href="sell.html" class="underline font-semibold">Sell Item</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-xl">
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-1">Create New Listing</h2>
            <p class="text-gray-500 mb-6 text-sm">Turn your unwanted items into fast cash within the campus network.</p>

            <form id="sellForm" class="space-y-4">
                <!-- Title input -->
                <div>
                    <label class="block text-gray-700 font-medium mb-1 text-sm">Item Heading / Title</label>
                    <input type="text" id="itemTitle" placeholder="e.g., Lab Coat Size L, Casio Calc" 
                           class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none text-sm" required>
                </div>

                <!-- Category Matrix Selection -->
                <div>
                    <label class="block text-gray-700 font-medium mb-1 text-sm">Category Alignment</label>
                    <select id="itemCategory" class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none text-sm" required>
                        <option value="">-- Choose Category --</option>
                        <option value="Textbooks">Textbooks</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Lab & Draughting">Lab & Draughting</option>
                        <option value="Hostel Essentials">Hostel Essentials</option>
                    </select>
                </div>

                <!-- Price and Phone Layout Wrap -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1 text-sm">Price (INR)</label>
                        <input type="number" id="itemPrice" placeholder="₹ Amount" min="0"
                               class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none text-sm" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1 text-sm">Phone Number</label>
                        <input type="tel" id="itemContact" placeholder="10-digit mobile" pattern="[0-9]{10}"
                               class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none text-sm" required>
                    </div>
                </div>

                <!-- Long-form Text Description -->
                <div>
                    <label class="block text-gray-700 font-medium mb-1 text-sm">Item Details & Condition</label>
                    <textarea id="itemDesc" rows="4" placeholder="Describe usage time, wear & tear status, or handover preferences..." 
                              class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none text-sm" required></textarea>
                </div>

                <!-- Primary Action Submission Control -->
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-md transition duration-200 cursor-pointer text-sm shadow-sm">
                    Publish Marketplace Listing
                </button>
            </form>

            <div id="successBanner" class="hidden mt-4 p-3 bg-green-100 text-green-700 rounded-md text-center font-medium text-sm">
                Listing cataloged live! Moving to main market... 🚀
            </div>
        </div>
    </main>

    <script>
        document.getElementById('sellForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newItem = {
                id: Date.now(),
                title: document.getElementById('itemTitle').value.trim(),
                category: document.getElementById('itemCategory').value,
                price: parseFloat(document.getElementById('itemPrice').value),
                contact: document.getElementById('itemContact').value.trim(),
                description: document.getElementById('itemDesc').value.trim(),
                date: Date.now(),
                sold: false
            };

            let items = JSON.parse(localStorage.getItem('marketItems')) || [];
            items.push(newItem);
            localStorage.setItem('marketItems', JSON.stringify(items));

            document.getElementById('sellForm').reset();
            const banner = document.getElementById('successBanner');
            banner.classList.remove('hidden');

            // Timeout sequence redirect to view updates
            setTimeout(() => {
                window.location.href = 'market.html';
            }, 1500);
        });
    </script>
</body>
</html>
